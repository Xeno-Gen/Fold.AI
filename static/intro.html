    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #e6e6e6;
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.07);
            --shadow-xl: 0 20px 60px rgba(0,0,0,0.12);
            --bubble-user: #dceeff;
            --bubble-user-text: #1a1a1a;
            --input-width: 50vw;
            --input-min-width: 480px;
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;}

        body {
            --scroll-color: rgba(0,0,0,.08);
            --scroll-color-hover: rgba(0,0,0,.15);
            scrollbar-color: var(--scroll-color) transparent;
            transition: scrollbar-color .1s ease-out;
        }
        body:hover {
            scrollbar-color: var(--scroll-color-hover) transparent;
        }
        ::-webkit-scrollbar{width:6px; height:6px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:var(--scroll-color);border-radius:100px;transition:background .1s ease-out,width .1s ease-out;}
        ::-webkit-scrollbar-thumb:hover{background:var(--scroll-color-hover);}
        ::-webkit-scrollbar-button{display:none!important; width:0!important; height:0!important;}
        ::-webkit-scrollbar-corner{background:transparent;}
        *{scrollbar-width:thin; scrollbar-color:var(--scroll-color) transparent;}

        body{
    font-family: var(--chat-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif);
            background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;display:flex;
            -webkit-font-smoothing:antialiased;
        }
        .app-container{display:flex;height:100vh;height:100dvh;width:100%;position:relative;}
        .sidebar-left{
            position:fixed;left:-25vw;top:0;width:25vw;min-width:200px;max-width:420px;height:100vh;
            background:#fafafa;border-right:0.5px solid var(--border);
            display:flex;flex-direction:column;align-items:stretch;padding:16px 0 16px 12px;gap:6px;
            z-index:100;transition:left var(--transition),box-shadow 0.3s ease;overflow:hidden;
            box-shadow:4px 0 20px rgba(0,0,0,0);
        }
        .sidebar-left.visible{left:0;box-shadow:4px 0 20px rgba(0,0,0,0.06);}
        .sidebar-left.expanded{left:0;}
        .sidebar-toggle{
            position:fixed;top:8px;left:8px;width:38px;height:38px;
            border-radius:6px;border:none;background:#fff;display:flex;
            align-items:center;justify-content:center;cursor:pointer;z-index:101;
            color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.06);
            transition:left 0.3s cubic-bezier(0.4,0,0.2,1),background 0.2s,box-shadow 0.2s;
        }
        .sidebar-toggle:hover{background:#f0f0f0;box-shadow:0 1px 6px rgba(0,0,0,0.1);}
        .sidebar-left.visible .sidebar-toggle{left:clamp(154px, 25vw - 46px, 374px);background:transparent;box-shadow:none;}
        .sidebar-left.visible .sidebar-toggle:hover{background:rgba(0,0,0,0.04);}
        .sidebar-newchat-fab{
            position:fixed;top:52px;left:8px;width:38px;height:38px;
            border-radius:10px;border:none;background:#fff;display:flex;
            align-items:center;justify-content:center;cursor:pointer;z-index:101;
            color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.06);
            transition:opacity 0.3s ease,background 0.2s;
        }
        .sidebar-newchat-fab:hover{background:#f0f0f0;color:#1a1a1a;}
        .sidebar-left.visible .sidebar-newchat-fab{opacity:0;pointer-events:none;}
        .sidebar-settings-fab{
            position:fixed;bottom:12px;left:8px;width:38px;height:38px;
            border-radius:10px;border:none;background:#fff;display:flex;
            align-items:center;justify-content:center;cursor:pointer;z-index:101;
            color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.06);
            transition:opacity 0.3s ease,background 0.2s;
        }
        .sidebar-settings-fab:hover{background:#f0f0f0;color:#1a1a1a;}
        .sidebar-left.visible .sidebar-settings-fab{opacity:0;pointer-events:none;}
        @media(max-width:768px){.sidebar-newchat-fab{top:52px;}.sidebar-settings-fab{top:auto;bottom:12px;}.sidebar-left{left:-100%;}.sidebar-left.visible{left:0;}}
        /* 桌面端：侧边栏展开时右边内容右移 */
        @media(min-width:769px){
            .sidebar-left{position:fixed;left:-25vw;}
            .sidebar-left.visible{left:0;}
            .sidebar-left.visible ~ .main-content{margin-left:clamp(200px, 25vw, 420px);}
            .main-content{transition:margin-left var(--transition);}
        }
        .sidebar-content{display:none;flex-direction:column;gap:6px;width:100%;overflow-y:auto;flex:1;padding-right:12px;}
        .sidebar-left.visible .sidebar-content{display:flex;}
        .sidebar-logo{
            font-size:20px;letter-spacing:-0.5px;color:#1a1a1a;margin-bottom:16px;cursor:pointer;
            user-select:none;display:none;white-space:nowrap;
        }
        .sidebar-left.visible .sidebar-logo{display:block;}
        .sidebar-logo .bold{font-weight:700;}.sidebar-logo .light{font-weight:300;}
        .new-chat-btn{
            display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:6px;
            border:0.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:500;
            color:#1a1a1a;transition:var(--transition);white-space:nowrap;width:100%;
        }
        .new-chat-btn:hover{background:#f9f9f9;border-color:#d5d5d5;}
        .chat-history-list{list-style:none;display:flex;flex-direction:column;gap:2px;flex:1;width:100%;}
        .chat-history-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:#555;
            white-space:nowrap;overflow:hidden;position:relative;
        }
        .chat-history-item:hover{background:#eaeaea;color:#1a1a1a;}
        .chat-history-item.active{background:#e0e0e0;font-weight:500;}
        .chat-history-item .history-title{flex:1;overflow:hidden;text-overflow:ellipsis;}
        .chat-history-item .history-actions{display:flex;gap:4px;margin-left:8px;visibility:hidden;}
        .chat-history-item:hover .history-actions{visibility:visible;}
        .history-actions .action-icon.small{width:22px;height:22px;color:#999;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
        .sidebar-section-title{
            font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:#999;
            padding:6px 4px;margin-top:4px;display:none;
        }
        .sidebar-left.visible .sidebar-section-title{display:block;}
        .sidebar-settings-btn{
            display:none;width:calc(100% - 12px);align-items:center;gap:8px;padding:10px 14px;
            border-radius:6px;border:0.5px solid var(--border);background:#fff;
            cursor:pointer;font-size:13px;font-weight:500;color:#1a1a1a;
            transition:var(--transition);white-space:nowrap;margin-top:auto;flex-shrink:0;margin-right:12px;
        }
        .sidebar-settings-btn:hover{background:#f9f9f9;border-color:#d5d5d5;}
        .sidebar-left.visible .sidebar-settings-btn{display:flex;}
        .main-content{
            flex:1;display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative;min-width:0;
            align-items:center;overflow:hidden;background:#fff;
        }
        .chat-header{
            display:flex;align-items:center;justify-content:center;
            width:var(--input-width);min-width:var(--input-min-width);
            padding:16px 0 8px;font-size:14px;font-weight:500;color:#555;
            border-bottom:1px solid #f0f0f0;margin-bottom:4px;
            opacity:0;transition:var(--transition);flex-shrink:0;height:0;overflow:hidden;cursor:pointer;
        }
        body.chat-active .chat-header{opacity:1;height:auto;}
        .chat-header span{display:inline;}
        .chat-header input{display:none;border:1px solid #ddd;border-radius:4px;padding:2px 8px;font-size:14px;width:200px;text-align:center;}
        .center-initial{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;
            flex-direction:column;align-items:center;gap:28px;width:var(--input-width);
            min-width:var(--input-min-width);padding:0 20px;transition:var(--transition);z-index:5;
        }
        body.chat-active .center-initial{display:none;}
        .title-container{position:relative;display:inline-block;overflow:hidden;}
        .title-text{font-size:50px;letter-spacing:-1.5px;color:var(--text,#1a1a1a);z-index:1;font-family:"PingFang SC","Noto Serif SC","Songti SC",serif;font-weight:400;user-select:none;}
        .title-subtitle{font-size:15px;color:var(--text-secondary,#999);text-align:center;margin-top:2px;font-weight:400;user-select:none;}
        .title-beam {
    position: absolute;
    top: 0;
    width: 80px;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.08) 15%,
        rgba(255, 255, 255, 0.35) 40%,
        rgba(255, 255, 255, 0.55) 50%,
        rgba(255, 255, 255, 0.35) 60%,
        rgba(255, 255, 255, 0.08) 85%,
        transparent 100%
    );
    z-index: 3;
    animation: beamSweep 3s infinite;
    border-radius: 4px;
    filter: blur(0.5px);
}

@keyframes beamSweep {
    0% { left: 100%; opacity: 0; }
    5% { opacity: 1; }
    22% { left: -80px; opacity: 1; }
    26% { left: -80px; opacity: 0; }
    100% { left: -80px; opacity: 0; }
}
        .title-glow{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120%;height:120%;
            background:radial-gradient(ellipse at center,rgba(0,0,0,0.025) 0%,transparent 70%);
            z-index:0;animation:glowPulse 3.2s infinite;border-radius:50%;
        }
        @keyframes glowPulse{0%,100%{opacity:0.3;}10%{opacity:0.85;}20%{opacity:0.3;}}
        .input-wrapper-outer{
            width:100%;background:#fff;border-radius:22px;box-shadow:var(--shadow-lg);
            border:1px solid #e8e8e8;transition:var(--transition);overflow:visible;
        }
        .input-wrapper-outer:focus-within{box-shadow:0 8px 40px rgba(0,0,0,0.1);border-color:#d0d0d0;}
        .input-inner-area{padding:15px 18px 6px;}
        .input-textarea{
            width:100%;border:none;outline:none;resize:none;font-size:15px;font-family:inherit;
            color:#1a1a1a;background:transparent;line-height:1.55;min-height:50px;max-height:none;padding:0;
        }
        .input-textarea::placeholder{color:#aaa;}
        .input-toolbar{
            display:flex;align-items:center;justify-content:space-between;padding:4px 14px 10px;
            gap:6px;border-top:1px solid transparent;
        }
        .input-wrapper-outer:focus-within .input-toolbar{border-top-color:transparent;}
        .toolbar-left{display:flex;align-items:center;gap:4px;flex:1;}
        .toolbar-right{display:flex;align-items:center;gap:6px;}
        .tool-btn{
            width:34px;height:34px;border-radius:6px;border:none;background:transparent;
            cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center;
        }
        .tool-btn:hover{background:#f4f4f4;color:#333;}
        .send-btn{background:#1a1a1a;color:#fff;border-radius:6px;width:36px;height:36px;}
        .send-btn:hover{background:#333;}
        .send-btn:disabled{background:#ccc;color:#999;cursor:not-allowed;}
        .stop-btn{background:#1a1a1a;color:#fff;}

        .model-select-wrapper{position:relative;display:inline-block;}
        .model-select-btn{
            background:transparent;border:none;border-radius:6px;padding:0 10px;
            height:32px;font-size:12px;font-weight:500;color:#555;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
            gap:4px;white-space:nowrap;transition:var(--transition);font-family:inherit;
        }
        .model-select-btn:hover{background:#f2f2f2;}

        .model-picker-dropdown{
            position:fixed;z-index:999;display:none;flex-direction:column;
            width:338px;max-height:400px;background:#fff;border-radius:6px;
            box-shadow:0 20px 50px rgba(0,0,0,0.18);border:0.5px solid #e0e0e0;
            overflow:hidden;transform-origin:bottom center;
        }
        .model-picker-dropdown.show{display:flex;animation:dropExpand 0.15s cubic-bezier(0.165,0.85,0.45,1) forwards;}
        @keyframes dropExpand{0%{opacity:0;transform:scaleY(0.85) translateY(6px);}100%{opacity:1;transform:scaleY(1) translateY(0);}}
        .model-picker-dropdown .model-search{padding:12px;border-bottom:1px solid #f0f0f0;}
        .model-picker-dropdown .model-search input{
            width:100%;padding:10px 14px;border:1px solid #e8e8e8;border-radius:6px;
            font-size:13px;outline:none;background:#fafafa;
        }
        .model-picker-dropdown .model-list{flex:1;overflow-y:auto;padding:8px;}
        .model-picker-item{
            display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:6px;
            cursor:pointer;transition:var(--transition);margin-bottom:2px;
        }
        .model-picker-item:hover{background:#f3f3f3;}
        .model-picker-item.active{background:#e8e8e8;font-weight:600;color:#000;}
        .model-picker-item .model-name{font-size:13px;color:#1a1a1a;font-weight:500;flex:1;}
        .model-picker-item.active .model-name{color:#000;}
        .model-ctx-badge{
            display:inline-block;padding:2px 8px;border-radius:10px;background:#f0efec;
            font-size:10px;font-weight:600;color:#8b8178;margin-left:6px;flex-shrink:0;
            letter-spacing:0.3px;line-height:1.5;
        }
        [data-theme="dark"] .model-ctx-badge{background:#2a2a2a;color:#999;}

        .char-count{font-size:10px;color:#aaa;user-select:none;margin-right:4px;white-space:nowrap;}
        .image-preview-area{display:flex;gap:6px;padding:6px 14px 2px;flex-wrap:wrap;max-height:120px;overflow-y:auto;min-height:0;}
        .image-preview-area:empty{padding:0;}
        .image-preview-item,.file-preview-item{
            border-radius:6px;border:1px solid #e0e0e0;position:relative;flex-shrink:0;
        }
        .remove-preview{
            position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
            background:#fff;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;
            cursor:pointer;font-size:10px;color:#999;
        }

        .chat-area{
            width:100%;flex:1;overflow-y:auto;scrollbar-gutter:stable;padding:20px 0 16px;
            display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;
            opacity:0;pointer-events:none;max-height:0;
        }
        body.chat-active .chat-area{
            opacity:1;pointer-events:all;max-height:none;flex:1 1 auto;
            animation:chatReveal 0.35s 0.12s ease backwards;
        }
        @keyframes chatReveal {
            from{opacity:0;}
            to{opacity:1;}
        }
        .chat-area-inner{
            width:var(--input-width);min-width:var(--input-min-width);
            margin:0 auto;padding:0 8px;
            display:flex;flex-direction:column;gap:10px;
        }

        .message-bubble{
            max-width:78%;padding:10px 16px;font-size:var(--chat-font-size,15px);line-height:1.85;word-wrap:break-word;
            position:relative;margin-bottom:40px;
        }
        .message-user{align-self:flex-end;background:var(--bubble-user);color:var(--bubble-user-text);border-radius:4px 18px 6px 18px;}
        .message-ai{align-self:flex-start;background:transparent;color:#1a1a1a;max-width:100%;}
        .message-ai .markdown-body{line-height:1.85;}
        .markdown-body p{margin:0 0 0.6em;}
        .markdown-body p:last-child{margin-bottom:0;}
        .message-system{align-self:stretch;background:#f5f5f5;color:#555;font-size:13px;line-height:1.5;border-radius:4px;padding:8px 14px;margin:4px 0;max-width:100%;}
        .message-system .markdown-body{font-size:13px;line-height:1.5;}
        [data-theme="dark"] .message-system{background:#1a1a1a;color:#999;}

        .message-user .message-actions{
            position:absolute;
            right: 16px;
            bottom: -36px;
            display: flex;
            gap: 2px;
            opacity:0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 2;
        }
        .message-ai .message-actions{
            position:absolute;
            left: 16px;
            bottom: -36px;
            display: flex;
            gap: 2px;
            opacity:0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 2;
        }
        .message-system .message-actions{
            position:absolute;
            right: 16px;
            bottom: -32px;
            display: flex;
            gap: 2px;
            opacity:0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 2;
        }
        .message-bubble:hover .message-actions{opacity:1;pointer-events:auto;}
        .message-bubble::after{
            content:'';
            position:absolute;
            left:-60px;
            bottom:-36px;
            width:calc(100% + 120px);
            height:40px;
            pointer-events:auto;
            z-index:1;
        }
        .action-icon{
            width:28px;height:28px;border:none;background:transparent !important;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            color:#999;border-radius:6px;padding:0;transition:color 0.2s;
        }
        .action-icon:hover{color:#333;background:transparent !important;}

        /* 消息编辑区域 */
        .message-edit-area{display:flex;flex-direction:column;gap:8px;width:100%;}
        .message-bubble:has(.message-edit-area){width:100% !important;max-width:100% !important;}
        .message-edit-textarea{display:block;width:100%;min-height:20vh;max-height:45vh;padding:12px 16px;border:1px solid #c4c4c4;border-radius:8px;font-size:15px;font-family:inherit;line-height:1.7;resize:vertical;outline:none;background:#fafafa;color:var(--text);transition:border-color 0.2s,background 0.2s;box-sizing:border-box;}
        .message-edit-textarea:focus{border-color:#555;background:#fff;}
        .message-edit-actions{display:flex;gap:8px;justify-content:flex-end;}
        .message-edit-save,.message-edit-cancel{padding:6px 16px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;border:none;transition:background 0.2s;}
        .message-edit-save{background:#1a1a1a;color:#fff;}
        .message-edit-save:hover{background:#333;}
        .message-edit-cancel{background:#f0f0f0;color:#555;}
        .message-edit-cancel:hover{background:#e0e0e0;}
        [data-theme="dark"] .message-edit-textarea{background:#1a1a1a;border-color:#3a3a3a;color:var(--text);}
        [data-theme="dark"] .message-edit-textarea:focus{border-color:#666;background:#1a1a1a;}
        [data-theme="dark"] .message-edit-cancel{background:#2a2a2a;color:#999;}
        [data-theme="dark"] .message-edit-cancel:hover{background:#333;}
        [data-theme="dark"] .message-edit-save{background:#e8e8e8;color:#0a0a0a;}
        [data-theme="dark"] .message-edit-save:hover{background:#fff;}

        /* 深度思考标题栏 */
        .think-header {
            display: flex;
            align-items: center;
            user-select: none;
            cursor: pointer;
            padding: 4px 0;
            margin-bottom: 8px;
            color: #8b8b8b;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .think-header:hover { color: #555; }
        .think-header .think-icon {
            margin-right: 6px;
            display: flex;
            align-items: center;
        }
        .think-header .think-arrow {
            margin-left: auto;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
        }
        .think-block.collapsed .think-header .think-arrow {
            transform: rotate(-90deg);
        }

        .think-body-wrapper {
            padding: 5px 0 5px 22px;
            position: relative;
            overflow: hidden;
            max-height: none;
            opacity: 1;
        }
        .think-block.collapsed .think-body-wrapper {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .think-body-wrapper .think-line {
            border-left: 1px solid #d1d5db;
            height: calc(100% - 10px);
            position: absolute;
            top: 5px;
            left: 7.5px;
        }
        .think-body-wrapper .think-content {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .think-status {
            font-weight: 400;
            font-size: 11px;
            color: #888;
            margin-left: 6px;
        }

        .bottom-input-container{
            width:var(--input-width);min-width:var(--input-min-width);padding:8px 0 24px;opacity:0;
            pointer-events:none;max-height:0;overflow:hidden;flex-shrink:0;
        }
        body.chat-active .bottom-input-container{
            opacity:1;pointer-events:all;max-height:300px;
            animation:inputRiseIn 0.4s 0.08s cubic-bezier(0.25,0.1,0.25,1) backwards;
        }
        @keyframes inputRiseIn {
            from{opacity:0;transform:translateY(28px);max-height:0;}
            to{opacity:1;transform:translateY(0);max-height:300px;}
        }
        .bottom-spacer{height:20px;flex-shrink:0;}body.chat-active .bottom-spacer{height:10px;}

        .drawer-overlay{
            width:0;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;
            transition:width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .drawer-overlay.active{
            width:var(--drawer-width, 33%);position:relative;z-index:46;
        }
        .drawer{
            width:100%;height:100%;display:flex;flex-direction:column;
            background:var(--bg,#fff);border-left:0.5px solid var(--border,#e0e0e0);
            min-width:0;opacity:0;transition:opacity 0.25s ease 0.12s;
        }
        .drawer-overlay.active .drawer{opacity:1;}
        .drawer-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:18px 20px;border-bottom:0.5px solid var(--border,#e0e0e0);flex-shrink:0;
        }
        .drawer-header h2{font-size:15px;font-weight:600;color:var(--text,#333);margin:0;}
        .drawer-close,.drawer-close-btn{
            width:30px;height:30px;border-radius:6px;border:none;background:transparent;
            cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;
            transition:all 0.15s;
        }
        .drawer-close:hover,.drawer-close-btn:hover{background:var(--hover-bg,#f0f0f0);color:#555;}
        .drawer-body{flex:1;overflow-y:auto;padding:20px;}
        .section-title{font-size:12px;font-weight:600;color:#999;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;}
        .provider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:24px;}
        .provider-card{
            border:0.5px solid #ddd;border-radius:6px;padding:11px 8px;text-align:center;
            cursor:pointer;transition:var(--transition);background:#fff;
        }
        .provider-card:hover{border-color:#aaa;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
        .provider-card.active{border-color:#1a1a1a;background:#fafafa;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
        .provider-card .prov-icon{width:36px;height:36px;border-radius:6px;background:#f5f5f5;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
        .provider-card .prov-icon img{width:100%;height:100%;object-fit:contain;}
        .provider-name{font-size:11px;color:#555;font-weight:500;}

        .key-input-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
        .key-input-row input{flex:1;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;outline:none;background:#fafafa;}
        .key-input-row button{padding:10px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap;}
        .key-list{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
        .key-row{display:flex;align-items:center;padding:8px 12px;background:#fafafa;border-radius:6px;border:1px solid #eee;}
        .key-row .key-mask{flex:1;font-size:13px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .key-row .key-edit-input{flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;display:none;}
        .key-row.edit .key-mask{display:none;}
        .key-row.edit .key-edit-input{display:block;}
        .key-row .key-actions{display:flex;gap:4px;}
        .key-row .key-actions button{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:#888;border-radius:6px;display:flex;align-items:center;justify-content:center;}
        .key-row .key-actions button:hover{background:#eaeaea;color:#333;}

        .param-group{margin-bottom:20px;}
        .param-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:13px;color:#555;}
        .param-item label{flex:0 0 100px;}
        .param-item input[type="number"],
        .param-item textarea {
            width:140px;
            padding:6px 10px;
            border:1px solid #ddd;
            border-radius:4px;
            font-size:13px;
            outline:none;
            background:#fafafa;
            transition:border-color 0.2s;
            resize: vertical;
        }
        .param-item input[type="number"]:focus,
        .param-item textarea:focus {
            border-color:#aaa;
            background:#fff;
        }
        .system-prompt-section {
            margin: 20px 0;
        }
        .system-prompt-section textarea {
            width:100%;
            height:80px;
            padding:10px 14px;
            border:1px solid #e0e0e0;
            border-radius:6px;
            font-size:13px;
            font-family:inherit;
            outline:none;
            background:#fafafa;
            resize: vertical;
        }
        .system-prompt-section textarea:focus {
            border-color:#aaa;
            background:#fff;
        }
        .base-prompt-section {
            margin: 16px 0;
            padding: 12px 14px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 0.5px solid #eee;
        }
        .base-prompt-display {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 120px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .base-prompt-meta {
            font-size: 11px;
            color: #999;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 0.5px solid #eee;
        }
        .pure-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 0.5px solid #eee;
        }
        .pure-mode-label {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }
        .pure-mode-hint {
            font-size: 11px;
            color: #b8860b;
            margin-top: 6px;
            font-style: italic;
        }

        .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 24px;border-radius:4px;font-size:14px;z-index:999999;transition:opacity 0.3s;}
        @keyframes streamFadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
        .stream-fadein{animation:streamFadeIn 0.4s ease;}
        .empty-state-hint{text-align:center;color:#bbb;font-size:13px;margin-top:32px;user-select:none;}
        body.chat-active .empty-state-hint{display:none;}

        .direct-chat-container{text-align:center;margin-top:4px;}
        .center-initial.slide-down{animation:centerSlideDown 0.45s cubic-bezier(0.4,0,0.2,1) forwards;}
        @keyframes centerSlideDown{
            0%{transform:translate(-50%,-50%);opacity:1;}
            40%{opacity:0.6;}
            100%{transform:translate(-50%,22vh);opacity:0;}
        }

        @media(max-width:768px){
            :root{--input-width:100%;--input-min-width:unset;}
            .drawer-overlay.active{width:100%;}
            .model-picker-dropdown{width:90vw;left:5vw!important;transform-origin:bottom center!important;}
            .center-initial { top: 45%; }
            .bottom-input-container { padding: 8px 10px 24px; }
            .message-user .message-actions { right: 4px; bottom: -32px; left: auto; }
            .message-ai .message-actions { left: 4px; bottom: -32px; right: auto; }
            .message-bubble::after { left:-40px; width:calc(100% + 80px); }
        }
        .slash-command-popup{position:fixed;z-index:998;background:#fbfaf7;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.1);border:0.5px solid #e4e0d8;padding:4px;min-width:220px;max-width:380px;display:none;}
        .slash-command-popup.show{display:block;animation:dropExpand 0.15s cubic-bezier(0.165,0.85,0.45,1) forwards;}
        .slash-cmd-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;transition:background 0.15s;font-family:inherit;}
        .slash-cmd-item:hover,.slash-cmd-item.active{background:#dce8f5;}
        .slash-cmd-item .cmd-slash{color:#3c3630;font-weight:600;white-space:nowrap;font-family:"PingFang SC","Noto Serif SC","Songti SC",serif;}
        .slash-cmd-item .cmd-desc{color:#9b968b;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
        /* 命令结果浮动卡片 */
        .slash-result-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;background:rgba(0,0,0,0.1);}
        .slash-result-overlay.active{opacity:1;pointer-events:all;}
        .slash-result-card{background:#fbfaf7;border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,0.12);border:0.5px solid #e4e0d8;width:520px;max-width:92vw;max-height:72vh;overflow:hidden;display:flex;flex-direction:column;transform:scale(0.92);transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);}
        .slash-result-overlay.active .slash-result-card{transform:scale(1);}
        .slash-result-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:0.5px solid #e8e5df;flex-shrink:0;}
        .slash-result-header h2{font-size:16px;font-weight:600;color:#3c3630;font-family:"PingFang SC","Noto Serif SC","Songti SC",serif;}
        .slash-result-close{width:30px;height:30px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9b968b;transition:background 0.2s;}
        .slash-result-close:hover{background:#f0ede5;}
        .slash-result-body{padding:20px;overflow-y:auto;flex:1;}
        .context-bar-wrap{margin:12px 0;background:#e8e5df;border-radius:8px;height:16px;overflow:hidden;}
        .context-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#8b9d83,#6b8a5e);transition:width 0.5s ease;}
        .context-bar-fill.warn{background:linear-gradient(90deg,#d4a853,#c4953a);}
        .context-bar-fill.danger{background:linear-gradient(90deg,#c97a6e,#b8554a);}
        .context-stats{display:flex;justify-content:space-between;font-size:12px;color:#8b8178;margin-top:6px;}
        .slash-help-table{width:100%;border-collapse:collapse;margin:8px 0;}
        .slash-help-table td{padding:6px 12px;font-size:13px;border-bottom:0.5px solid #e8e5df;}
        .slash-help-table td:first-child{font-weight:600;white-space:nowrap;color:#3c3630;font-family:"SF Mono","Monaco","Consolas",monospace;}
        .slash-help-table td:last-child{color:#8b8178;}
        /* 输入联想虚影 */
        .slash-ghost{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;font-size:15px;font-family:inherit;line-height:1.55;padding:15px 18px 6px;white-space:pre-wrap;overflow:hidden;color:transparent;}
        .slash-ghost .ghost-completion{color:#c4c0b8;}
        [data-theme="dark"] .slash-command-popup{background:#1c1c1c;border-color:#2a2a2a;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
        [data-theme="dark"] .slash-cmd-item:hover,[data-theme="dark"] .slash-cmd-item.active{background:#1e3050;}
        [data-theme="dark"] .slash-cmd-item .cmd-slash{color:#e0d8c8;}
        [data-theme="dark"] .slash-cmd-item .cmd-desc{color:#888;}
        [data-theme="dark"] .slash-result-overlay{background:rgba(0,0,0,0.5);}
        [data-theme="dark"] .slash-result-card{background:#1c1c1c;border-color:#2a2a2a;box-shadow:0 20px 50px rgba(0,0,0,0.4);}
        [data-theme="dark"] .slash-result-header{border-bottom-color:#2a2a2a;}
        [data-theme="dark"] .slash-result-header h2{color:#e0d8c8;}
        [data-theme="dark"] .slash-result-close:hover{background:#252525;}
        [data-theme="dark"] .context-bar-wrap{background:#2a2a2a;}
        [data-theme="dark"] .slash-help-table td{border-bottom-color:#2a2a2a;}
        [data-theme="dark"] .slash-help-table td:first-child{color:#e0d8c8;}
        [data-theme="dark"] .slash-help-table td:last-child{color:#888;}
        [data-theme="dark"] .slash-ghost .ghost-completion{color:#555;}
        [data-theme="dark"] .context-stats{color:#888;}
        .msg-collapsed{max-height:28px !important;overflow:hidden;opacity:0.5;cursor:pointer;border-left:2px solid #c4c0b8;padding:4px 12px !important;margin-bottom:4px !important;font-size:12px;color:#8b8178;transition:max-height 0.3s ease,opacity 0.3s ease;}
        .msg-collapsed:hover{opacity:0.8;border-left-color:#8b8178;}
        .msg-collapsed.expanded{max-height:none !important;opacity:1;padding:10px 16px !important;font-size:15px;color:var(--text);}
        .msg-collapsed::before{content:'⊞ ' attr(data-title);font-style:italic;}
        .msg-collapsed.expanded::before{content:'';}
        [data-theme="dark"] .msg-collapsed{border-left-color:#444;color:#888;}
        [data-theme="dark"] .msg-collapsed:hover{opacity:0.8;border-left-color:#666;}
        .lang-switcher{position:fixed;top:14px;right:20px;z-index:45;display:flex;align-items:center;gap:6px;}
        .lang-switch-text{cursor:pointer;font-size:14px;font-family:inherit;color:#9b968b;user-select:none;transition:color 0.2s;}
        .lang-switch-text:hover{color:#3c3630;}
        .theme-toggle-btn{width:32px;height:32px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9b968b;transition:all 0.2s;}
        .theme-toggle-btn:hover{background:#f0f0f0;color:#3c3630;}
        [data-theme="dark"] .lang-switch-text{color:#8b8b8b;}
        [data-theme="dark"] .lang-switch-text:hover{color:#e0e0e0;}
        [data-theme="dark"] .theme-toggle-btn{color:#8b8b8b;}
        [data-theme="dark"] .theme-toggle-btn:hover{background:#2a2a2a;color:#e0e0e0;}


    </style>
</head>
<body>

        <span class="lang-switch-text" id="langSwitchText">中文</span>
        <button class="theme-toggle-btn" id="themeToggleBtn" title="切换主题">

<div class="app-container">

        </button>
        <button class="sidebar-settings-fab" id="sidebarSettingsFab" data-i18n-title="settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
        <div class="sidebar-content">

            <div class="sidebar-section-title"><span data-i18n="chatHistory">对话历史</span></div>

        </div>
        <button class="sidebar-settings-btn" id="sidebarSettingsBtn">

                    <div class="toolbar-left">

                        <button class="tool-btn" id="settingsBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>

                    <div class="toolbar-right">

<!-- 设置模态框 -->
<div class="settings-modal-overlay" id="settingsModalOverlay">
    <div class="settings-modal" id="settingsModal">
        <div class="settings-modal-header">
            <h2>设置</h2>
            <button class="settings-modal-close" id="settingsModalClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

            <!-- 常规设置 -->
            <div class="settings-section">
                <div class="settings-section-title">常规</div>

                <!-- 主题选择 -->
                <div class="settings-item">
                    <div class="settings-item-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                        <span>主题模式</span>
                    </div>
                    <div class="think-mode-selector" id="themeSelector">

                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                            <span>浅色</span>
                        </button>
                        <button class="think-mode-option" data-theme="dark">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            <span>深色</span>
                        </button>
                        <button class="think-mode-option" data-theme="system">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                            <span>跟随系统</span>
                        </button>
                    </div>
                </div>

                <!-- 深度思考后自动折叠 -->
                <div class="settings-item">
                    <div class="settings-item-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.47V19a2 2 0 11-4 0v-.53c0-1.03-.47-1.99-1.274-2.618l-.548-.547z"/>
                        </svg>
                        <span>思考后自动折叠</span>
                    </div>
                    <div class="think-mode-selector" id="autoCollapseToggle" style="display: inline-flex;">
                        <button class="think-mode-option active" data-value="true">开启</button>
                        <button class="think-mode-option" data-value="false">关闭</button>
                    </div>
                </div>
                <!-- 深度思考时折叠输出 -->
                <div class="settings-item">
                    <div class="settings-item-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        <span>深度思考时折叠</span>
                    </div>
                    <div class="think-mode-selector" id="thinkCollapseToggle" style="display: inline-flex;">
                        <button class="think-mode-option" data-value="on">开启</button>
                        <button class="think-mode-option active" data-value="off">关闭</button>
                        <button class="think-mode-option" data-value="latest">仅最新六行</button>
                    </div>
                </div>
                <!-- Prompt 语言 -->
                <div class="settings-item">
                    <div class="settings-item-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                        <span>Prompt 语言</span>
                    </div>
                    <div class="think-mode-selector" id="promptLangToggle" style="display: inline-flex;">
                        <button class="think-mode-option" data-lang="zh">中文</button>
                        <button class="think-mode-option" data-lang="en">English</button>
                    </div>
                </div>
            </div>

            <!-- 命令执行设置 -->
            <div class="settings-section">
                <div class="settings-section-title">命令执行</div>

                <div class="settings-item">
                    <div class="settings-item-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>

                        <span>执行前确认</span>
                    </div>
                    <div class="think-mode-selector" id="commandConfirmToggle" style="display: inline-flex;">
                        <button class="think-mode-option active" data-value="true">开启</button>
                        <button class="think-mode-option" data-value="false">关闭</button>
                    </div>
                </div>

            </div>

            <!-- 关于 -->
            <div class="settings-section">
                <div class="settings-section-title">关于</div>
                <div class="settings-item">
                    <div class="settings-item-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
